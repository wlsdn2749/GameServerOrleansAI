name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore GameServer.slnx

      - name: Build
        run: dotnet build GameServer.slnx --no-restore --configuration Release

      - name: Test
        run: dotnet test GameServer.slnx --no-build --configuration Release --verbosity normal
